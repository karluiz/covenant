<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Covenant</title>
    <style>
      /* Inline so the splash paints on the first frame, before
         /src/styles.css finishes loading. Full polish lives in
         styles.css under .boot-splash. */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(122, 162, 247, 0.14), transparent 38%),
          #0d0e10;
        color: #f5f6f7;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        transition: opacity 320ms ease-out;
      }
      #boot-splash.is-leaving { opacity: 0; pointer-events: none; }
      @media (prefers-color-scheme: light) {
        #boot-splash {
          background:
            radial-gradient(circle at 50% 42%, rgba(47, 111, 237, 0.13), transparent 38%),
            linear-gradient(180deg, #ffffff 0%, #f4f6fa 100%);
          color: #1a1d22;
        }
      }
    </style>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-live="polite" aria-label="Covenant is starting">
      <div class="boot-splash-card">
        <div class="boot-splash-orb" aria-hidden="true">
          <span class="boot-splash-orb-core"></span>
          <span class="boot-splash-orb-ring"></span>
          <span class="boot-splash-orb-ring boot-splash-orb-ring--two"></span>
        </div>
        <div class="boot-splash-headline">COVENANT</div>
        <div class="boot-splash-sub">AI-NATIVE TERMINAL</div>
        <div class="boot-splash-meta">
          <span class="boot-splash-meta-dot"></span>
          <span class="boot-splash-meta-text">Booting</span>
        </div>
      </div>
    </div>
    <header id="app-titlebar" data-tauri-drag-region>
      <div id="app-titlebar-left" data-tauri-drag-region>
        <button
          id="tabbar-fold"
          class="titlebar-icon-btn"
          type="button"
          title="Toggle left sidebar"
          aria-label="Toggle left sidebar"
        ></button>
        <button
          id="tabbar-collapse-all"
          class="titlebar-icon-btn"
          type="button"
          title="Collapse all groups"
          aria-label="Collapse all groups"
        ></button>
      </div>
      <div id="app-titlebar-center" data-tauri-drag-region>
        <span id="app-titlebar-brand" data-tauri-drag-region>COVENANT</span>
      </div>
      <div id="app-titlebar-right" data-tauri-drag-region>
        <div id="spawns-chip-mount" class="no-drag"></div>
        <span class="titlebar-sep" aria-hidden="true"></span>
        <button
          id="titlebar-project-notes"
          class="titlebar-icon-btn"
          type="button"
          title="Project notes (⌘⇧D)"
          aria-label="Project notes"
        ></button>
        <button
          id="titlebar-view-blocks"
          class="titlebar-icon-btn titlebar-view-btn titlebar-view-active"
          type="button"
          title="Blocks"
          aria-label="Blocks"
        ></button>
        <button
          id="titlebar-view-files"
          class="titlebar-icon-btn titlebar-view-btn"
          type="button"
          title="Files"
          aria-label="Files"
        ></button>
        <span class="titlebar-sep" aria-hidden="true"></span>
        <button
          id="tabbar-fold-right"
          class="titlebar-icon-btn"
          type="button"
          title="Toggle Blocks/Files sidebar"
          aria-label="Toggle Blocks/Files sidebar"
        ></button>
      </div>
    </header>
    <div id="app-content">
    <main id="layout">
      <header id="tabbar-host">
        <div id="tabs"></div>
        <div id="tabbar-rail"></div>
        <div id="tabbar-actions">
          <button id="new-tab" type="button" title="New tab (⌘T)">+</button>
          <button id="new-group" type="button" title="New group (⌘⇧G)">+</button>
        </div>
      </header>
      <section id="workspace"></section>
      <div id="workspace-switch-overlay" hidden>
        <div class="workspace-switch-spinner" aria-hidden="true"></div>
        <div class="workspace-switch-label">Switching workspace…</div>
      </div>
      <section id="settings-page" hidden></section>
      <section id="docs-page" hidden></section>
      <section id="drafts-page" hidden></section>
      <section id="spec-chat-page" hidden></section>
      <section id="mission-page" hidden></section>
      <section id="operator-page" hidden></section>
      <section id="capabilities-page" hidden></section>
      <footer id="status-bar" hidden></footer>
    </main>
    <aside id="familiar-panel" class="familiar-panel hidden"></aside>
    </div>
  </body>
</html>

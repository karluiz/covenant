<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boot Screen E — Waveform</title>
<style>
  :root {
    --bg: #0b0d10;
    --accent: #7aa2f7;
    --text-primary: #f5f6f7;
    --text-secondary: #8b929b;
    --text-tertiary: #5c626c;
    --border: #1c2027;
    --ink-rgb: 255 255 255;
    --ui-font: "SF Pro Text", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /*
   * Proposal E: Waveform
   * ────────────────────
   * Three staggered bars oscillate like an audio waveform — nods to
   * the headphones mark. Ultra-minimal, no chrome beyond the signal
   * and one text line. Works at any pane size.
   */

  .boot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .boot-wave {
    display: flex;
    align-items: center;
    gap: 5px;
    height: 48px;
  }

  .boot-wave span {
    width: 3px;
    background: var(--accent);
    border-radius: 1.5px;
    animation: wave 1.2s ease-in-out infinite;
  }

  .boot-wave span:nth-child(1) { animation-delay: 0s; height: 12px; }
  .boot-wave span:nth-child(2) { animation-delay: 0.15s; height: 24px; }
  .boot-wave span:nth-child(3) { animation-delay: 0.3s; height: 40px; }
  .boot-wave span:nth-child(4) { animation-delay: 0.45s; height: 24px; }
  .boot-wave span:nth-child(5) { animation-delay: 0.6s; height: 12px; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .boot-text {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .boot-title {
    font-family: var(--ui-font);
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .boot-title strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .boot-sub {
    font: 10.5px ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text-tertiary);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="boot">
  <div class="boot-wave">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="boot-text">
    <div class="boot-title">Starting <strong>Claude</strong></div>
    <div class="boot-sub">covenant · acp session</div>
  </div>
</div>

</body>
</html>

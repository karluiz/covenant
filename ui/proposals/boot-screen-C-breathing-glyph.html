<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boot Screen C — Breathing Glyph</title>
<style>
  :root {
    --bg: #0b0d10;
    --bg-panel: #11141a;
    --accent: #7aa2f7;
    --text-primary: #f5f6f7;
    --text-secondary: #8b929b;
    --text-tertiary: #5c626c;
    --border: #1c2027;
    --ink-rgb: 255 255 255;
    --ui-font: "SF Pro Text", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /*
   * Proposal C: Breathing Glyph
   * ────────────────────────────
   * The Covenant mark breathes with a slow radial glow — like a system
   * that's alive, waiting. A subtle progress bar crawls at the bottom.
   * The kicker line uses the same typographic pattern as the empty-state
   * intro rail (monospace uppercase + accent line). Feels polished,
   * intentional, and coherent with the rest of the Covenant chrome.
   */

  .boot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    position: relative;
  }

  /* Radial glow behind the mark */
  .boot-glow {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .boot-glow::before {
    content: "";
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--accent) 12%, transparent), transparent 70%);
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(0.8); opacity: 0.4; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .boot-glow svg {
    position: relative;
    z-index: 1;
    width: 36px;
    height: 36px;
    color: var(--accent);
    opacity: 0.9;
    filter: drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 30%, transparent));
  }

  /* Text block */
  .boot-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .boot-kicker {
    display: flex;
    align-items: center;
    gap: 10px;
    font: 10.5px ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .boot-kicker::before,
  .boot-kicker::after {
    content: "";
    width: 18px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  .boot-title {
    font-family: var(--ui-font);
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
  }

  .boot-title strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  /* Thin progress bar at the bottom of the boot block */
  .boot-progress {
    width: 140px;
    height: 2px;
    background: rgb(var(--ink-rgb) / 0.06);
    overflow: hidden;
    border-radius: 1px;
  }

  .boot-progress-fill {
    height: 100%;
    width: 40%;
    background: var(--accent);
    opacity: 0.7;
    animation: slide 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  /* Subtle version watermark */
  .boot-version {
    position: fixed;
    bottom: 16px;
    right: 20px;
    font: 10px ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text-tertiary);
    opacity: 0.5;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="boot">
  <div class="boot-glow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
      <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3v5z"/>
      <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3v5z"/>
    </svg>
  </div>

  <div class="boot-text">
    <div class="boot-kicker">Covenant</div>
    <div class="boot-title">Starting <strong>Claude</strong></div>
  </div>

  <div class="boot-progress">
    <div class="boot-progress-fill"></div>
  </div>
</div>

<div class="boot-version">v0.9.26</div>

</body>
</html>

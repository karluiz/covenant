name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    # 22.04 on purpose: oldest supported glibc so the binaries run on both
    # current Fedora and Ubuntu LTS. Do not bump to -latest without checking.
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libfuse2 zsh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci

      - name: Run pty + blocks tests
        run: |
          cargo test -p karl-pty
          cargo test -p karl-blocks

      # targets "all" on Linux = .deb + .rpm + .AppImage in one build.
      # Only the AppImage participates in the auto-updater (Tauri's Linux
      # updater cannot update deb/rpm installs — those upgrade via apt/dnf).
      #
      # --no-default-features drops embeddings (like the Intel macOS leg):
      # ort's prebuilt onnxruntime needs glibc >= 2.38 (__isoc23_strto*),
      # which 22.04 (glibc 2.35) can't link against.
      - name: Build Tauri bundles
        run: npm run tauri build -- -- --no-default-features
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_BACKTRACE: 1

      - name: Locate artifacts
        id: art
        run: |
          set -euo pipefail
          find_one() { find target/release/bundle -name "$1" -type f | head -n1; }
          DEB=$(find_one '*.deb');           [ -n "$DEB" ] || { echo 'no deb'; exit 1; }
          RPM=$(find_one '*.rpm');           [ -n "$RPM" ] || { echo 'no rpm'; exit 1; }
          APP=$(find_one '*.AppImage');      [ -n "$APP" ] || { echo 'no AppImage'; exit 1; }
          SIG=$(find_one '*.AppImage.sig');  [ -n "$SIG" ] || { echo 'no AppImage.sig (updater)'; exit 1; }
          {
            echo "deb=$DEB"
            echo "rpm=$RPM"
            echo "appimage=$APP"
            echo "sig=$SIG"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Prerelease until the manifest job promotes it — see release-macos.yml,
          # which also explains why this creates unconditionally instead of
          # checking `gh release view` first (view can't tell 404 from 503).
          gh release create "$TAG" --title "$TAG" --prerelease \
            --notes "Automated release. See CHANGELOG for details." || true
          gh release upload "$TAG" \
            "${{ steps.art.outputs.deb }}" \
            "${{ steps.art.outputs.rpm }}" \
            "${{ steps.art.outputs.appimage }}" \
            "${{ steps.art.outputs.sig }}" \
            --clobber

      - name: Upload bundles as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: covenant-linux-bundles
          path: |
            ${{ steps.art.outputs.deb }}
            ${{ steps.art.outputs.rpm }}
            ${{ steps.art.outputs.appimage }}
            ${{ steps.art.outputs.sig }}

name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci

      - name: Write notary API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build + sign + notarize Tauri (aarch64 — Apple Silicon)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Locate updater artifacts
        id: artifacts
        run: |
          TGZ=$(find target -name '*.app.tar.gz' | head -n1)
          SIG=$(find target -name '*.app.tar.gz.sig' | head -n1)
          if [ -z "$TGZ" ] || [ -z "$SIG" ]; then
            echo "missing tar.gz or .sig"; exit 1
          fi
          echo "tgz=$TGZ" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Automated release. See CHANGELOG for details."
          gh release upload "$TAG" "${{ steps.artifacts.outputs.tgz }}" --clobber
          gh release upload "$TAG" "${{ steps.artifacts.outputs.sig }}" --clobber

      - name: Emit per-platform manifest fragment
        run: |
          mkdir -p manifest-fragments
          SIG_CONTENT=$(cat "${{ steps.artifacts.outputs.sig }}")
          TGZ_NAME=$(basename "${{ steps.artifacts.outputs.tgz }}")
          cat > "manifest-fragments/darwin-aarch64.json" <<EOF
          {
            "darwin-aarch64": {
              "signature": "${SIG_CONTENT}",
              "url": "https://github.com/karluiz/covenant/releases/download/${{ github.ref_name }}/${TGZ_NAME}"
            }
          }
          EOF

      - name: Upload manifest fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-darwin
          path: manifest-fragments/darwin-aarch64.json

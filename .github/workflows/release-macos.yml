name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci

      - name: Write notary API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build + sign + notarize Tauri (universal — Intel + Apple Silicon)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Locate updater artifacts
        id: artifacts
        run: |
          TGZ=$(find target -name '*.app.tar.gz' | head -n1)
          SIG=$(find target -name '*.app.tar.gz.sig' | head -n1)
          DMG=$(find target -name '*.dmg' | head -n1)
          if [ -z "$TGZ" ] || [ -z "$SIG" ]; then
            echo "missing tar.gz or .sig"; exit 1
          fi
          if [ -z "$DMG" ]; then
            echo "missing .dmg (codesign likely failed)"; exit 1
          fi
          echo "tgz=$TGZ" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "dmg_sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Automated release. See CHANGELOG for details."
          gh release upload "$TAG" "${{ steps.artifacts.outputs.tgz }}" --clobber
          gh release upload "$TAG" "${{ steps.artifacts.outputs.sig }}" --clobber
          gh release upload "$TAG" "${{ steps.artifacts.outputs.dmg }}" --clobber

      - name: Emit per-platform manifest fragment
        run: |
          mkdir -p manifest-fragments
          SIG_CONTENT=$(cat "${{ steps.artifacts.outputs.sig }}")
          TGZ_NAME=$(basename "${{ steps.artifacts.outputs.tgz }}")
          URL="https://github.com/karluiz/covenant/releases/download/${{ github.ref_name }}/${TGZ_NAME}"
          # Universal bundle runs natively on both arches → both keys point at the
          # same tgz + signature so Intel and Apple Silicon users both get updates.
          cat > "manifest-fragments/darwin-universal.json" <<EOF
          {
            "darwin-aarch64": {
              "signature": "${SIG_CONTENT}",
              "url": "${URL}"
            },
            "darwin-x86_64": {
              "signature": "${SIG_CONTENT}",
              "url": "${URL}"
            }
          }
          EOF

      - name: Upload manifest fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-darwin
          path: manifest-fragments/darwin-universal.json

      - name: Update Homebrew tap (karluiz/homebrew-covenant)
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          DMG_SHA256: ${{ steps.artifacts.outputs.dmg_sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set; skipping cask update"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          TAP_DIR="$RUNNER_TEMP/homebrew-covenant"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/karluiz/homebrew-covenant.git" "$TAP_DIR"
          cat > "$TAP_DIR/Casks/covenant.rb" <<EOF
          cask "covenant" do
            version "${VERSION}"
            sha256 "${DMG_SHA256}"

            url "https://github.com/karluiz/covenant/releases/download/v#{version}/Covenant_#{version}_universal.dmg"
            name "Covenant"
            desc "AI-native terminal for macOS"
            homepage "https://covenant.uno"

            depends_on macos: ">= :ventura"

            app "Covenant.app"

            zap trash: [
              "~/Library/Application Support/com.karluiz.covenant",
              "~/Library/Preferences/com.karluiz.covenant.plist",
              "~/Library/Caches/com.karluiz.covenant",
              "~/Library/Logs/Covenant",
            ]
          end
          EOF
          cd "$TAP_DIR"
          git config user.name "covenant-release-bot"
          git config user.email "noreply@covenant.uno"
          git add Casks/covenant.rb
          git commit -m "covenant ${VERSION}"
          git push origin HEAD

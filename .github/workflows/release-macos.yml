name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Build BOTH macOS arches as separate targets ───────────────────────────
  # `universal-apple-darwin` cannot be used: it lipo's an aarch64 + x86_64 fat
  # binary, but `ort`/ONNX Runtime (via fastembed) ships no x86_64-apple-darwin
  # prebuilt, so the Intel slice fails to build. Instead we build two SEPARATE
  # targets on the (Apple Silicon) runner — aarch64 cross-compiles x86_64 — and
  # the Intel leg drops embeddings with --no-default-features so `ort` leaves
  # the graph entirely. Each arch ships its own DMG + updater bundle + key.
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
            cargo_args: ""            # default features → embeddings ON
          - arch: x64
            target: x86_64-apple-darwin
            # Cargo args go after a SECOND `--` — the tauri CLI forwards them to
            # cargo; passed directly it errors `unexpected argument`. Drops
            # embeddings so `ort` (no x86_64-darwin prebuilt) leaves the graph.
            cargo_args: "-- --no-default-features"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci

      - name: Write notary API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build + sign + notarize Tauri (${{ matrix.arch }})
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: npm run tauri build -- --target ${{ matrix.target }} ${{ matrix.cargo_args }}

      - name: Locate + rename per-arch artifacts
        id: artifacts
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          BUNDLE="target/${{ matrix.target }}/release/bundle"
          VERSION="${GITHUB_REF_NAME#v}"

          TGZ=$(find "$BUNDLE" -name '*.app.tar.gz' | head -n1)
          SIG=$(find "$BUNDLE" -name '*.app.tar.gz.sig' | head -n1)
          DMG=$(find "$BUNDLE" -name '*.dmg' | head -n1)
          if [ -z "$TGZ" ] || [ -z "$SIG" ]; then echo "missing tar.gz or .sig"; exit 1; fi
          if [ -z "$DMG" ]; then echo "missing .dmg (codesign likely failed)"; exit 1; fi

          # The updater tgz is named "Covenant.app.tar.gz" for BOTH arches, so
          # rename per-arch to avoid clobbering each other on the release. The
          # DMG is already arch-named by Tauri (_aarch64.dmg / _x64.dmg).
          OUT="artifacts-$ARCH"; mkdir -p "$OUT"
          TGZ_NAME="Covenant_${VERSION}_${ARCH}.app.tar.gz"
          cp "$TGZ" "$OUT/$TGZ_NAME"
          cp "$SIG" "$OUT/$TGZ_NAME.sig"
          cp "$DMG" "$OUT/$(basename "$DMG")"

          echo "tgz=$OUT/$TGZ_NAME" >> "$GITHUB_OUTPUT"
          echo "sig=$OUT/$TGZ_NAME.sig" >> "$GITHUB_OUTPUT"
          echo "dmg=$OUT/$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Automated release. See CHANGELOG for details."
          gh release upload "$TAG" "${{ steps.artifacts.outputs.tgz }}" --clobber
          gh release upload "$TAG" "${{ steps.artifacts.outputs.sig }}" --clobber
          gh release upload "$TAG" "${{ steps.artifacts.outputs.dmg }}" --clobber

  # ── Update the Homebrew cask once, after BOTH arches are on the release ───
  cask:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap (two-installer cask)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping cask update"; exit 0
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/karluiz/covenant/releases/download/${TAG}"

          # Pull both per-arch DMGs from the release and hash them.
          gh release download "$TAG" --repo karluiz/covenant \
            -p "Covenant_${VERSION}_aarch64.dmg" -p "Covenant_${VERSION}_x64.dmg" -D dmgs
          ARM_SHA=$(shasum -a 256 "dmgs/Covenant_${VERSION}_aarch64.dmg" | awk '{print $1}')
          INTEL_SHA=$(shasum -a 256 "dmgs/Covenant_${VERSION}_x64.dmg" | awk '{print $1}')

          TAP_DIR="$RUNNER_TEMP/homebrew-covenant"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/karluiz/homebrew-covenant.git" "$TAP_DIR"
          cat > "$TAP_DIR/Casks/covenant.rb" <<EOF
          cask "covenant" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_SHA}"
              url "${BASE}/Covenant_#{version}_aarch64.dmg"
            end
            on_intel do
              sha256 "${INTEL_SHA}"
              url "${BASE}/Covenant_#{version}_x64.dmg"
            end

            name "Covenant"
            desc "AI-native terminal for macOS"
            homepage "https://covenant.uno"

            depends_on macos: ">= :ventura"

            app "Covenant.app"

            zap trash: [
              "~/Library/Application Support/com.karluiz.covenant",
              "~/Library/Preferences/com.karluiz.covenant.plist",
              "~/Library/Caches/com.karluiz.covenant",
              "~/Library/Logs/Covenant",
            ]
          end
          EOF
          cd "$TAP_DIR"
          git config user.name "covenant-release-bot"
          git config user.email "noreply@covenant.uno"
          git add Casks/covenant.rb
          git commit -m "covenant ${VERSION}"
          git push origin HEAD

name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          # NOT target/ — the key is Cargo.lock-hashed and every release bumps
          # versions, so target/ is always a cache miss (cold build regardless)
          # yet the post-step spends ~25m compressing+uploading its GBs. Cache
          # only the registry/git, which are stable and actually restored.
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci

      - name: Run pty smoke test
        run: cargo test -p karl-pty --test windows_smoke -- --nocapture

      - name: Run blocks parser tests
        run: cargo test -p karl-blocks

      # Injects bundle.windows.signCommand with an absolute script path (Tauri hook cwd
      # is crates/app, so a relative path in tauri.conf.json would not resolve).
      # The script itself no-ops when SSLCOM_* secrets are unset.
      - name: Prepare Authenticode sign config
        shell: pwsh
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE 'scripts/ci/sign-windows.ps1'
          $conf = @{ bundle = @{ windows = @{ signCommand = @{
            cmd  = 'powershell'
            args = @('-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', $script, '%1')
          } } } } | ConvertTo-Json -Depth 6
          Set-Content -Path sign-config.json -Value $conf

      - name: Build Tauri MSI (signed for updater)
        run: npm run tauri build -- --config sign-config.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # SSL.com eSigner Authenticode signing — scripts/ci/sign-windows.ps1 skips
          # when these are unset, so releases stay unsigned-but-green until the cert exists.
          SSLCOM_USERNAME: ${{ secrets.SSLCOM_USERNAME }}
          SSLCOM_PASSWORD: ${{ secrets.SSLCOM_PASSWORD }}
          SSLCOM_CREDENTIAL_ID: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          SSLCOM_TOTP_SECRET: ${{ secrets.SSLCOM_TOTP_SECRET }}
          RUST_BACKTRACE: 1

      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Recurse -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) { Write-Error 'no msi produced'; exit 1 }
          "path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($msi.Name)"     >> $env:GITHUB_OUTPUT

      - name: Locate updater signature
        id: updater
        shell: pwsh
        run: |
          # Tauri 2.x signs the .msi directly — no .msi.zip wrapper.
          $sig = Get-ChildItem -Recurse -Filter '*.msi.sig' | Select-Object -First 1
          if (-not $sig) { Write-Error 'missing updater signature (*.msi.sig)'; exit 1 }
          "sig_path=$($sig.FullName)" >> $env:GITHUB_OUTPUT
          "sig_name=$($sig.Name)"     >> $env:GITHUB_OUTPUT

      - name: Upload MSI to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # Prerelease until the manifest job promotes it — see release-macos.yml,
          # which also explains why this creates unconditionally instead of
          # checking `gh release view` first (view can't tell 404 from 503).
          gh release create $tag --title $tag --prerelease --notes "Automated release. See CHANGELOG for details."
          # "already exists" is the expected path when another platform job won
          # the race — clear it so the step is judged on the uploads below.
          $global:LASTEXITCODE = 0
          gh release upload $tag "${{ steps.msi.outputs.path }}" --clobber
          gh release upload $tag "${{ steps.updater.outputs.sig_path }}" --clobber

      - name: Upload MSI as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: covenant-windows-msi
          path: ${{ steps.msi.outputs.path }}

      - name: Emit per-platform manifest fragment
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path manifest-fragments -Force | Out-Null
          $sig = Get-Content -Raw "${{ steps.updater.outputs.sig_path }}"
          # Tauri 2.x Windows updater downloads the .msi directly.
          $url = "https://github.com/karluiz/covenant/releases/download/${{ github.ref_name }}/${{ steps.msi.outputs.name }}"
          $json = @{ "windows-x86_64" = @{ signature = $sig; url = $url } } | ConvertTo-Json -Depth 4
          Set-Content -Path manifest-fragments/windows-x86_64.json -Value $json

      - name: Upload manifest fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-windows
          path: manifest-fragments/windows-x86_64.json
